<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultat de la qualification · ALTONÉO</title>
<link rel="stylesheet" href="/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&display=swap">
<script src="../flow.js" defer></script>
</head>
<body>
<div class="page-wrapper">
<div class="deco-coin-hg" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100" fill="none">
    <path d="M14 45 C92 20 142 35 192 75" stroke="#1b274c" stroke-width="18" stroke-linecap="round"/>
  </svg>
</div>
<div class="deco-coin-bd" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="none">
    <path d="M12 55 C90 80 140 65 190 25" stroke="#f8b132" stroke-width="16" stroke-linecap="round"/>
  </svg>
</div>

<header>
  <a class="logo-altoneo" href="/" title="ALTONÉO — Accueil">
    <img src="../../images/logo-altoneo.png" alt="Altonéo" class="logo-img" height="38">
  </a>
  <div class="header-spacer"></div>
  <nav class="nav-principale">
    <a href="/">Accueil</a>
  </nav>
</header>

<nav class="nav-mobile">
  <a href="/">Accueil</a>
</nav>

<main>

  <section>
    <div id="fil-reponses" class="fil-reponses"></div>

    <div class="carte-resultat">
      <svg class="vague-coin deco" viewBox="0 0 130 90" preserveAspectRatio="none" aria-hidden="true" style="position:absolute;right:-10px;bottom:-10px;width:120px;height:80px;opacity:.18;color:#fff"><path d="M150 90 C100 60 110 20 60 30 C20 38 30 70 -10 70 L150 90 Z" fill="currentColor"/></svg>
      <span class="etiquette">Outil recommandé</span>
      <h2 style="color:#fff;font-size:18px;font-weight:700;margin-bottom:6px">D'après les réponses données, l'outil conseillé est&nbsp;:</h2>
      <div id="outil-encadre" class="outil-encadre">—</div>
      <p class="aide">Cette recommandation se base sur l'ensemble du parcours de qualification ci-dessus.</p>

      <div class="actions-resultat">
        <a class="btn btn-jaune" href="/tuile_3/batiment/">Refaire le questionnaire</a>
        <a class="btn btn-ligne" style="border-color:rgba(255,255,255,.4);color:#fff" href="/">Retour à l'accueil</a>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      afficherFil('fil-reponses');
      const params = new URLSearchParams(window.location.search);
      const code = params.get('outil') || '';
      const libelles = {
        'PROGBAT': 'PROGBAT',
        'PROGBAT_INQOM': 'PROGBAT + INQOM',
        'EASYTODAY': 'EASYTODAY',
        'EASYTODAY_INQOM': 'EASYTODAY + INQOM',
        'GEST_DO_IT': 'GEST DO IT'
      };
      document.getElementById('outil-encadre').textContent = libelles[code] || code || '—';
    });
  </script>
</main>

<footer class="footer-altoneo">
  <svg class="footer-vague deco" viewBox="0 0 1440 60" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,30 C180,60 360,0 540,24 C720,48 900,0 1080,26 C1260,52 1350,18 1440,30 L1440,60 L0,60 Z" fill="currentColor"/>
  </svg>
  <div class="footer-inner">
    <div class="footer-marque">
      <img src="../../images/logo-altoneo-footer_2.png" alt="Altonéo" class="logo-img logo-img-footer" height="38">
    </div>
    <div class="footer-texte">Quels outils pour nos clients ? · Secteur Bâtiment &nbsp;·&nbsp; <span class="pill-v">Création : IT Solutions</span></div>
  </div>
</footer>

</div>
</body>
</html>
